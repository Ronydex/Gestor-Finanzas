<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Mi Gestor de Finanzas</title>
	<link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class = "container mt-5">
<div class="header-container">

	<div class="user-nav-wrapper">

		<div class="user-profile">
			<a th:href="@{/perfil}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
				<img th:src="${usuario?.fotoUrl ?: 'https://via.placeholder.com/40'}" alt="Perfil" class="profile-img">
				<span th:text="${usuario?.nombre}" class="user-name">Nombre Usuario</span>
			</a>
		</div>
		<form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
			<button type="submit" class="btn-logout">
				<i class="fas fa-sign-out-alt"></i> Cerrar Sesión
			</button>
		</form>

	</div>
</div>
<div class="container-fluid mt-4">
	<div class="row">

		<div class="col-lg-7">
			<div class="card shadow">
				<div class="card-header bg-primary text-white">
					<h2 class="mb-0">Historial de Ingresos y Egresos</h2>
				</div>
				<div class="card-body">
					<form th:action="@{/gastos/nuevo-form}" method="POST" class="row g-3 mb-4 p-3 bg-light border rounded shadow-sm">
						<div class="col-md-4">
							<input type="text" name="descripcion" class="form-control" placeholder="¿En qué gastaste?" required>
						</div>
						<div class="col-md-3">
							<div class="input-group">
								<span class="input-group-text">$</span>
								<input type="number" step="0.01" name="monto" class="form-control" placeholder="Monto" required>
							</div>
						</div>
						<div class="col-md-3">
							<select name="tipo" class="form-select" required>
								<option value="INGRESO">Ingreso (+)</option>
								<option value="EGRESO">Egreso (-)</option>
							</select>
						</div>
						<div class="col-md-2">
							<button type="submit" class="btn btn-dark w-100">Añadir</button>
						</div>
					</form>

					<div class="table-responsive">
						<table class="table table-hover">
							<thead class="table-dark">
							<tr>
								<th>Fecha</th>
								<th>Descripción</th>
								<th>Tipo</th>
								<th>Monto</th>
								<th>Acción</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="g : ${gastos}">
								<td th:text="${g.fecha}"></td>
								<td th:text="${g.descripcion}"></td>
								<td>
                                        <span th:text="${g.tipo}"
											  th:class="${g.tipo.name() == 'INGRESO' ? 'badge bg-success' : 'badge bg-danger'}">
                                        </span>
								</td>
								<td th:text="${'$' + #numbers.formatDecimal(g.monto, 1, 2)}"></td>
								<td>
									<a th:href="@{'/gastos/eliminar/' + ${g.id}}"
									   class="btn btn-outline-danger btn-sm"
									   onclick="return confirm('¿Estás seguro de borrar este registro?')">
										Borrar
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>

					<div class="mt-4 p-3 bg-light border text-end">
						<h4>Saldo Actual:
							<span th:text="${'$ ' + #numbers.formatDecimal(saldo, 1, 2)}"
								  th:classappend="${saldo >= 0 ? 'text-success' : 'text-danger'}">
                            </span>
						</h4>
					</div>
				</div>
			</div>
		</div>

		<div class="col-lg-5">
			<div class="card shadow mb-4">
				<div class="card-header py-3 bg-white">
					<h6 class="m-0 font-weight-bold text-primary text-center">Distribución de Ingresos y Egresos</h6>
				</div>
				<div class="card-body">
					<div style="position: relative; height: 400px; width: 100%;">
						<canvas id="miGraficaDeGastos"></canvas>
					</div>
				</div>
			</div>

			<div class="card bg-info text-white shadow p-3">
				<div class="card-body">
					<h5>Consejo Financiero</h5>
					<p>Recuerda que los <span class="badge bg-danger">Egresos</span> no deben superar el 80% de tus ingresos totales para mantener salud financiera.</p>
				</div>
			</div>
		</div>


	</div> </div> ```
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<script th:inline="javascript">
		/*<![CDATA[*/
            document.addEventListener("DOMContentLoaded", function() {
                // 1. Recibimos los datos de Thymeleaf
                const etiquetas = /*[[${descripciones}]]*/ [];
                const valores = /*[[${montos}]]*/ [];
                const tipos = /*[[${tipos}]]*/ [];

                console.log("Datos recibidos:", {etiquetas, valores, tipos});

                const canvas = document.getElementById('miGraficaDeGastos');
                if (!canvas) return;

                // 2. Definimos colores: Verde para INGRESO, Rojo para EGRESO
                const coloresFondo = tipos.map(t => t === 'INGRESO' ? 'rgba(40, 167, 69, 0.7)' : 'rgba(220, 53, 69, 0.7)');
                const coloresBorde = tipos.map(t => t === 'INGRESO' ? 'rgba(40, 167, 69, 1)' : 'rgba(220, 53, 69, 1)');

                // 3. Crear la gráfica
                try {
                    const ctx = canvas.getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: etiquetas,
                            datasets: [{
                                data: valores,
                                backgroundColor: coloresFondo,
                                borderColor: coloresBorde,
                                borderWidth: 2,
                                hoverOffset: 15
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                } catch (err) {
                    console.error("Error al crear la gráfica:", err);
                }
            });
        /*]]>*/
	</script>
</div>
</body>
</html>
